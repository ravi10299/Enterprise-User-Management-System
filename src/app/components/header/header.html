<header class="header">
  <div class="title"><i class="fa-solid fa-user"></i> Enterprise User Management System</div>
  <div class="search-box">
    <input
      type="text"
      placeholder="Search by name, age, or city"
      [value]="searchUser()"
      (input)="searchUser.set($event.target.value)"
      class="search-input"
    />
    <button (click)="handleOnSearch()" class="search-button">Search</button>
  </div>
</header>
